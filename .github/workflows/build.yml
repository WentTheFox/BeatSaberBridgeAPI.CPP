name: CMake Build

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: true

      release_name:
        description: 'Release title'
        required: false
        default: ''

      release_body:
        description: 'Release description'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache build artifact
        id: cache-build
        uses: actions/cache@v4
        with:
          path: BeatSaberBridgeAPI.CPP-*.zip
          key: build-${{ runner.os }}-${{ github.sha }}

      - name: Read SDK cache key
        id: sdk-key
        if: steps.cache-build.outputs.cache-hit != 'true'
        shell: bash
        run: echo "key=discord-sdk-$(tr -d '[:space:]' < scripts/sdk-sha256.txt)" >> $GITHUB_OUTPUT

      - name: Cache Discord SDK
        id: cache-sdk
        if: steps.cache-build.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: lib/discord_social_sdk
          key: ${{ steps.sdk-key.outputs.key }}-${{ runner.os }}

      - name: Set up SDK
        if: steps.cache-build.outputs.cache-hit != 'true' && steps.cache-sdk.outputs.cache-hit != 'true'
        shell: bash
        env:
          SDK_DOWNLOAD_URL: ${{ vars.SDK_DOWNLOAD_URL }}
          SDK_DOWNLOAD_TOKEN: ${{ secrets.SDK_DOWNLOAD_TOKEN }}
        run: |
          bash scripts/setup-sdk.sh

      - name: Set up CMake
        if: steps.cache-build.outputs.cache-hit != 'true'
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          mkdir build && cd build
          cmake ..

      - name: Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          cd build
          cmake --build . --config Release

      - name: Install runtime dependencies (Linux)
        if: runner.os == 'Linux' && steps.cache-build.outputs.cache-hit != 'true'
        run: sudo apt-get install -y --no-install-recommends libpulse0

      - name: Self-test
        if: steps.cache-build.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./build/Release/BeatSaberBridgeAPI.CPP.exe --self-test
          else
            ./build/BeatSaberBridgeAPI.CPP --self-test
          fi

      - name: Prepare Windows build
        if: runner.os == 'Windows' && steps.cache-build.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item build/Release/BeatSaberBridgeAPI.CPP.exe dist/
          Copy-Item build/Release/discord_partner_sdk.dll dist/
          Compress-Archive -Path dist/* -DestinationPath BeatSaberBridgeAPI.CPP-windows.zip

      - name: Prepare Linux build
        if: runner.os == 'Linux' && steps.cache-build.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir dist
          cp build/BeatSaberBridgeAPI.CPP dist/
          cp build/libdiscord_partner_sdk.so dist/
          cd dist && zip ../BeatSaberBridgeAPI.CPP-linux.zip *

      - name: Prepare macOS build
        if: runner.os == 'macOS' && steps.cache-build.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir dist
          cp build/BeatSaberBridgeAPI.CPP dist/
          cp build/libdiscord_partner_sdk.dylib dist/
          cd dist && zip ../BeatSaberBridgeAPI.CPP-macos.zip *

      - name: Upload Windows build
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: BeatSaberBridgeAPI.CPP-windows.zip

      - name: Upload Linux build
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: BeatSaberBridgeAPI.CPP-linux.zip

      - name: Upload macOS build
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: BeatSaberBridgeAPI.CPP-macos.zip

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: binaries

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: binaries

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}

          name: ${{ github.event.inputs.release_name != '' &&
            github.event.inputs.release_name ||
            github.event.inputs.tag_name }}

          body: ${{ github.event.inputs.release_body }}

          files: |
            binaries/BeatSaberBridgeAPI.CPP-windows.zip
            binaries/BeatSaberBridgeAPI.CPP-linux.zip
            binaries/BeatSaberBridgeAPI.CPP-macos.zip

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
