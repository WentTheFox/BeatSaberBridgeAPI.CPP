name: CMake Build

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: true

      release_name:
        description: 'Release title'
        required: false
        default: ''

      release_body:
        description: 'Release description'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SDK
        shell: bash
        run: |
          bash scripts/setup-sdk.sh

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: |
          cmake ..

      - name: Build
        run: |
          cd build
          cmake --build .

          
      - name: Prepare Windows binary
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp build/Release/BeatSaberBridgeAPI.CPP.exe BeatSaberBridgeAPI.CPP-windows.exe

      - name: Prepare Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cp build/BeatSaberBridgeAPI.CPP BeatSaberBridgeAPI.CPP-linux

      - name: Prepare macOS binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cp build/BeatSaberBridgeAPI.CPP BeatSaberBridgeAPI.CPP-macos

      #
      # Upload binaries
      #
      - name: Upload Windows binary
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: BeatSaberBridgeAPI.CPP-windows.exe

      - name: Upload Linux binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: BeatSaberBridgeAPI.CPP-linux

      - name: Upload macOS binary
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: BeatSaberBridgeAPI.CPP-macos

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: binaries

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: binaries

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: macos-binary
          path: binaries

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}

          name: ${{ github.event.inputs.release_name != '' &&
            github.event.inputs.release_name ||
            github.event.inputs.tag_name }}

          body: ${{ github.event.inputs.release_body }}

          files: |
            build/BeatSaberBridgeAPI.CPP-windows.exe
            build/BeatSaberBridgeAPI.CPP-linux
            build/BeatSaberBridgeAPI.CPP-macos

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}